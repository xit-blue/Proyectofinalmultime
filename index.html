    .fallback-card p{color:#cbd5e1;line-height:1.6;margin:0;}
    .fallback-card a{display:inline-block;margin-top:16px;padding:13px 18px;border-radius:14px;background:#EA580C;color:white;text-decoration:none;font-weight:bold;}
