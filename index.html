<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia Virtual Pública</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #06111f;
      font-family: Arial, sans-serif;
    }

    .app-frame {
      width: 100%;
      height: 100vh;
      border: 0;
      display: block;
    }

    .fallback {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: white;
      background: linear-gradient(135deg, #06111f, #0b1730);
    }

    .fallback-card {
      max-width: 420px;
      padding: 28px;
      border-radius: 22px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    .fallback-card h1 {
      margin: 0 0 12px;
      font-size: 26px;
    }

    .fallback-card p {
      color: #cbd5e1;
      line-height: 1.6;
    }

    .fallback-card a {
      display: inline-block;
      margin-top: 14px;
      padding: 13px 18px;
      border-radius: 14px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <iframe
    class="app-frame"
    src="https://script.google.com/macros/s/AKfycbyCgM44PiaKBPrXjQCSqo955UGTyv9gbQhgaXVWV1I4xA5nX_ptZbiaX7k8xoulRi5ufw/exec"
    allow="clipboard-read; clipboard-write"
  ></iframe>

  <div class="fallback">
    <div class="fallback-card">
      <h1>Academia Virtual Pública</h1>
      <p>Si la plataforma no carga correctamente, abre el acceso directo.</p>
      <a href="https://script.google.com/macros/s/AKfycbyCgM44PiaKBPrXjQCSqo955UGTyv9gbQhgaXVWV1I4xA5nX_ptZbiaX7k8xoulRi5ufw/exec" target="_blank">
        Abrir plataforma
      </a>
    </div>
  </div>
</body>
</html>
